<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareConnect - Doctor Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo"><i class="fa-solid fa-heart-pulse"></i> CareConnect</a>
      <nav class="nav-links">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="doctors.html" class="nav-btn">Find Doctors</a>
        <a href="patient-dashboard.html" class="nav-btn">Patient Dashboard</a>
        <a href="doctor-dashboard.html" class="nav-btn active">Doctor Portal</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="dashboard-header flex-between">
      <div>
        <h2>Doctor Dashboard</h2>
        <p>Logged in as: <strong>Dr. Rajesh Sharma (Cardiology - Max Super Speciality)</strong></p>
      </div>
      <span class="badge badge-success"><i class="fa-solid fa-circle"></i> Online & Accepting Patients</span>
    </div>

    <div class="card">
      <h3>Today's Patient Schedule</h3>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Patient Name</th>
              <th>Time</th>
              <th>Consultation Type</th>
              <th>Fee</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="doctor-schedule-list">
            <!-- Dynamic Injection via app.js -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderDoctorDashboard();
    });
  </script>
</body>
</html>
